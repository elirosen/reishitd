<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בית כנסת ראשית דגנך</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 90vw;
            max-height: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
            text-align: center;
        }
        
        img {
            max-width: 100%;
            max-height: 70vh;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        .update-info {
            color: #666;
            font-size: 14px;
            margin-top: 30px;
            text-align: center;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 22px;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>בית כנסת ראשית דגנך</h1>
        <img src="https://www.dropbox.com/scl/fi/f2y4xjcxwjuieisha2hdv/behalotcha-2026.jpg?rlkey=mgg62r9ffh24enm5yaodt84gs&st=qnjo0x5h&dl=0" alt="זמני תפילה" id="weeklyImage">
        <!-- 
        uncomment this if you want to show the second image
        <br>
        <img src="image2.jpeg" alt="זמני תפילה" id="weeklyImage"> 
        -->
        
        <p class="update-info">עוד עדכונים בקרוב </p>
    </div>
    
    <script>
        // Optional: Add a cache-busting query parameter to force fresh image load
        // Remove the comment below if you want to ensure visitors always see the latest image
        //const img = document.getElementById('weeklyImage');
        //img.src = 'image.png?' + new Date().getTime();
    </script>
</body>
</html>
